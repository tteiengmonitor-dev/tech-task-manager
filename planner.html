<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Panel</title>

<style>
:root{
    --bg1:#0f2027;
    --bg2:#203a43;
    --card:#1e2e34;
    --accent:#d4a373;
    --text:#f1f1f1;
    --border:#35565f;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    color:var(--text);
}

.container{
    width:100%;
    max-width:900px;
    background:var(--card);
    padding:28px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

h1{ color:var(--accent); margin-top:0; }

label{
    display:block;
    margin-top:14px;
    font-weight:600;
    font-size:13px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#142328;
    color:var(--text);
    font-size:14px;
    box-sizing:border-box;
}

textarea{ resize:vertical; min-height:60px; }

input[type="date"],
input[type="time"]{
    color-scheme: dark;
}

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator{
    filter: invert(1);
    opacity:0.9;
    cursor:pointer;
}

button{
    margin-top:10px;
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.primary{ background:var(--accent); color:#000; }
.small{ background:#2b444c; color:#fff; margin-right:6px; }
.logout{ float:right; background:#444; color:#fff; }

.checkbox-box{
    margin-top:10px;
    padding:12px 16px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#142328;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.checkbox-item{
    display:flex;
    align-items:center;
    gap:10px;
}

.checkbox-item input{
    accent-color:var(--accent);
    width:16px;
    height:16px;
}

.time-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-top:12px;
}

.time-row > div{
    display:flex;
    flex-direction:column;
}

@media(max-width:768px){
    .time-row{
        grid-template-columns:1fr;
    }
}

.hidden{ display:none; }

.summary{
    margin-top:18px;
    padding:14px;
    background:#142328;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Login</h1>

<div id="loginBox">
  <label>Employee ID</label>
  <input type="text" id="empId">

  <label>Password</label>
  <input type="password" id="password">

  <button class="primary" onclick="login()">Login</button>
</div>

<div id="plannerSystem" class="hidden">

<button class="logout" onclick="logout()">Logout</button>
<h1>🔧 Planner Panel</h1>

<label>Job Reference</label>
<input type="text" id="jobRef">

<label>รายละเอียดงาน</label>
<textarea id="jobDetail"></textarea>

<label>วันที่ทำงาน</label>
<input type="date" id="planDate">
<button class="small" onclick="setToday()">วันนี้</button>
<button class="small" onclick="setTomorrow()">พรุ่งนี้</button>

<label>เลือกพนักงาน</label>
<div class="checkbox-box" id="techBox">
  Loading...
</div>

<div class="time-row">
  <div>
    <label>เวลาเริ่มงาน</label>
    <input type="time" id="startTime">
  </div>
  <div>
    <label>เวลาคาดว่าจะเสร็จ</label>
    <input type="time" id="endTime">
  </div>
</div>

<label>Duration (hr)</label>
<input type="number" id="duration" step="0.25">

<div class="summary" id="summary">
รอกรอกข้อมูล...
</div>

<button class="primary" onclick="submitPlan()">ส่งแผน</button>

</div>
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyYSSyAy8xQa5jINo-A7YHEPJY3DgRWeeB3C1lVmKwZKdgYJ-YESOP69CWCEmIrgBvmdQ/exec";

let lastChanged=null;

function setCookie(name,value,days){
  const d = new Date();
  d.setTime(d.getTime()+(days*24*60*60*1000));
  document.cookie = name+"="+value+";expires="+d.toUTCString()+";path=/";
}

function getCookie(name){
  const value = "; "+document.cookie;
  const parts = value.split("; "+name+"=");
  if(parts.length === 2) return parts.pop().split(";").shift();
}

function deleteCookie(name){
  document.cookie = name+'=; Max-Age=-99999999;';
}    
    
// ================= INIT =================
window.onload = () => {

  const empId = getCookie("empId");
  const role  = getCookie("role");

  if(!empId || role !== "planner"){
  return;
}

  setTomorrow();
};

// ================= LOGIN =================
function login(){

  fetch(WEBAPP_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      empId:document.getElementById("empId").value,
      password:document.getElementById("password").value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      if(data.role !== "planner"){
        alert("คุณไม่มีสิทธิ์เข้า Planner");
        return;
      }

        setCookie("empId", data.empId, 30);
        setCookie("role", data.role, 30);
      showPlanner();
    }else{
      alert("Login Failed");
    }
  });
}

function showPlanner(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("plannerSystem").classList.remove("hidden");
  loadAssignable();
}

function logout(){

  sessionStorage.removeItem("empId");
  sessionStorage.removeItem("role");

  location.href = "index.html";

}

// ================= DATE =================
function setToday(){
  const today=new Date().toISOString().split("T")[0];
  document.getElementById("planDate").value=today;
  updateSummary();
}

function setTomorrow(){
  const d=new Date();
  d.setDate(d.getDate()+1);
  document.getElementById("planDate").value=d.toISOString().split("T")[0];
  updateSummary();
}

// ================= TIME CALC =================
function timeToMin(t){
  if(!t) return 0;
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function minToTime(min){
  const h=Math.floor(min/60);
  const m=min%60;
  return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

function recalc(){

  const start=document.getElementById("startTime").value;
  const duration=parseFloat(document.getElementById("duration").value);
  const end=document.getElementById("endTime").value;

  if(start){
    if(lastChanged==="duration" && duration){
      document.getElementById("endTime").value=
        minToTime(timeToMin(start)+duration*60);
    }
    else if(lastChanged==="end" && end){
      const diff=timeToMin(end)-timeToMin(start);
      document.getElementById("duration").value=(diff/60).toFixed(2);
    }
  }

  updateSummary();
}

document.getElementById("duration").addEventListener("input",()=>{
  lastChanged="duration";
  recalc();
});
document.getElementById("endTime").addEventListener("input",()=>{
  lastChanged="end";
  recalc();
});
document.getElementById("startTime").addEventListener("input",recalc);

// ================= LOAD TECH =================
function loadAssignable(){

  const empId = sessionStorage.getItem("empId");

  fetch(`${WEBAPP_URL}?action=getAssignable&plannerId=${empId}`)
  .then(res=>res.json())
  .then(data=>{

    const box = document.getElementById("techBox");
    box.innerHTML="";

    if(data.length === 0){
      box.innerHTML="ไม่มี technician ที่ assign ได้";
      return;
    }

    data.forEach(emp=>{
      box.innerHTML+=`
        <label class="checkbox-item">
          <input type="checkbox" value="${emp.empId}">
          ${emp.name}
        </label>
      `;
    });

    document.querySelectorAll("#techBox input")
      .forEach(cb=>cb.addEventListener("change",updateSummary));
  });
}

// ================= SUMMARY =================
function updateSummary(){

  const job=document.getElementById("jobRef").value;
  const detail=document.getElementById("jobDetail").value;
  const date=document.getElementById("planDate").value;
  const start=document.getElementById("startTime").value;
  const end=document.getElementById("endTime").value;
  const duration=document.getElementById("duration").value;

  const checked=[...document.querySelectorAll("#techBox input:checked")]
      .map(el=>el.value);

  document.getElementById("summary").innerHTML=
  `<b>Job:</b> ${job||'-'}<br>
   <b>Detail:</b> ${detail||'-'}<br>
   <b>Date:</b> ${date||'-'}<br>
   <b>Start:</b> ${start||'-'}<br>
   <b>End:</b> ${end||'-'}<br>
   <b>Duration:</b> ${duration||'-'} hr<br>
   <b>Technician:</b> ${checked.length?checked.join(", "):'-'}`;
}

document.getElementById("jobRef").addEventListener("input",updateSummary);
document.getElementById("jobDetail").addEventListener("input",updateSummary);
document.getElementById("planDate").addEventListener("input",updateSummary);

// ================= CREATE TASK =================
function submitPlan(){

  const selectedEmp =
    [...document.querySelectorAll("#techBox input:checked")]
    .map(el=>el.value)
    .join(",");

  if(!selectedEmp){
    alert("กรุณาเลือก Technician");
    return;
  }

  fetch(WEBAPP_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"createTask",
      empId:sessionStorage.getItem("empId"),
      jobRef:document.getElementById("jobRef").value,
      detail:document.getElementById("jobDetail").value,
      planDate:document.getElementById("planDate").value,
      startPlan:document.getElementById("startTime").value,
      endPlan:document.getElementById("endTime").value,
      durationPlan:document.getElementById("duration").value,
      assignedEmp:selectedEmp
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert(data.error);
      return;
    }
    alert("Task Created: " + data.taskId);
  });
}

</script>

</body>

</html>
